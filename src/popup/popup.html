<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OnlineStore CH risk-check</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup-container">
    <!-- Header -->
    <header class="popup-header">
      <div class="logo-area">
        <div class="logo-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="9" cy="21" r="1"/>
            <circle cx="20" cy="21" r="1"/>
            <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/>
          </svg>
        </div>
        <div class="logo-text">
          <h1 data-i18n="popupTitle">OnlineStore CH risk-check</h1>
          <span class="subtitle" data-i18n="popupSubtitle">URL Security Analyzer</span>
        </div>
      </div>
      <div class="header-actions">
        <button class="btn-whitelist" id="btnAddWhitelist" data-i18n="btnAddWhitelist" title="Add to Whitelist" style="display:none;">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
            <line x1="12" y1="8" x2="12" y2="16"/>
            <line x1="8" y1="12" x2="16" y2="12"/>
          </svg>
        </button>
        <button class="btn-whitelist active" id="btnRemoveWhitelist" data-i18n="btnRemoveWhitelist" title="Remove from Whitelist" style="display:none;">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
            <line x1="8" y1="12" x2="16" y2="12"/>
          </svg>
        </button>
      </div>
    </header>

    <!-- Status Card -->
    <div class="status-card" id="statusCard">
      <div class="status-indicator" id="statusIndicator">
        <div class="status-icon" id="statusIcon">
          <div class="pulse-ring"></div>
          <svg class="icon-loading" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10" stroke-dasharray="31.4 31.4"/>
          </svg>
        </div>
        <div class="status-text">
          <span class="status-label" id="statusLabel" data-i18n="statusChecking">Checking…</span>
          <span class="status-detail" id="statusDetail" data-i18n="statusAnalyzingPage">Analyzing current page</span>
        </div>
      </div>
    </div>

    <!-- URL Display -->
    <div class="url-section">
      <label class="section-label" data-i18n="urlSectionLabel">Current URL</label>
      <div class="url-display" id="urlDisplay">
        <span class="url-text" id="urlText" data-i18n="urlLoading">Loading…</span>
      </div>
    </div>

    <!-- Threats Section -->
    <div class="threats-section" id="threatsSection" style="display:none;">
      <label class="section-label" data-i18n="threatsSectionLabel">Detected Issues</label>
      <div class="threats-list" id="threatsList"></div>
    </div>

    <!-- Details Section -->
    <div class="details-section" id="detailsSectionApi" style="display:none;">
      <label class="section-label" data-i18n="securityAnalysisLabel">Google Safe-Browsing Analysis</label>
      <div class="details-content" id="detailsContentApi"></div>
    </div>

    <div class="details-section" id="detailsSectionKtipp" style="display:none;">
      <label class="section-label" data-i18n="ktippLabel">Ktipp/Saldo-Warnliste</label>
      <div class="details-content" id="detailsContentKtipp"></div>
    </div>

    <div class="details-section" id="detailsSectionReklamation" style="display:none;">
      <label class="section-label" data-i18n="reklamationLabel">reklamation.ch Complaints</label>
      <div class="details-content" id="detailsContentReklamation"></div>
    </div>

    <div class="details-section" id="detailsSectionAdminchUid" style="display:none;">
      <label class="section-label" data-i18n="uidAdminChLabel">Admin.ch UID</label>
      <div class="details-content" id="detailsContentAdminchUid"></div>
    </div>

    <div class="details-section" id="detailsSectionTrustpilot" style="display:none;">
      <label class="section-label" data-i18n="tpLabel">Trustpilot</label>
      <div class="details-content" id="detailsContentTrustpilot"></div>
    </div>

    <div class="details-section" id="detailsSectionTrustedshops" style="display:none;">
      <label class="section-label" data-i18n="tsLabel">Trusted Shops</label>
      <div class="details-content" id="detailsContentTrustedshops"></div>
    </div>

    <div class="details-section" id="detailsSection" style="display:none;">
      <label class="section-label" data-i18n="analysisDetailsLabel">Analysis Details</label>
      <div class="details-content" id="detailsContent"></div>
    </div>

    <!-- Actions -->
    <div class="actions-bar">
      <button class="btn btn-primary" id="btnRescan">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
          <polyline points="23 4 23 10 17 10"/>
          <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
        </svg>
        <span data-i18n="btnRescan">Scan</span>
      </button>
      <button class="btn btn-secondary" id="btnSettings">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
        <span data-i18n="btnSettings">Settings</span>
      </button>
    </div>

    <!-- Footer -->
    <footer class="popup-footer">
      <span class="check-time" id="checkTime"></span>
      <span class="version" id="appVersion">v__VERSION__</span>
    </footer>
  </div>

  <script src="popup.js"></script>
</body>
</html>
